<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishQuest - Level 3: Harf Avı (Spelling Balloons)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary: #ec4899;
            --success: #10b981;
            --text: #1e293b;
        }

        * { box-sizing: border-box; font-family: 'Fredoka', sans-serif; }
        
        body {
            background-color: #f0f9ff;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
            height: 100vh; /* Tam ekran yüksekliği */
            overflow: hidden;
        }

        header { text-align: center; margin-bottom: 20px; z-index: 10; flex-shrink: 0; }
        h1 { font-family: 'Comfortaa', cursive; color: #0f172a; margin: 0 0 5px 0; }
        .subtitle { color: #64748b; font-size: 1.1rem; margin: 0;}

        /* --- GÜNCELLENEN OYUN ALANI --- */
        #gameArea {
            position: relative;
            width: 100%; max-width: 1000px;
            flex-grow: 1; /* Kalan tüm yüksekliği kaplar */
            overflow: hidden; /* DIŞARI TAŞAN BALONLARI GİZLER */
            background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 100%); /* Gökyüzü arka planı */
            border-radius: 20px;
            border: 4px solid #fff;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            margin-bottom: 10px;
        }

        #targetContainer {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.9);
            padding: 15px 40px; border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            z-index: 20;
        }

        #targetIcon { font-size: 4rem; color: #f59e0b; margin-bottom: 10px; }

        #wordSlotsContainer { display: flex; gap: 15px; }
        
        .letter-slot {
            width: 50px; height: 60px;
            border-bottom: 5px solid #cbd5e1;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; font-weight: bold; color: var(--text);
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .letter-slot.filled { border-bottom-color: var(--success); color: var(--success); animation: popIn 0.3s; }

        /* --- GÜNCELLENEN BALON KODU --- */
        .balloon {
            position: absolute;
            top: 100%; /* Balonlar oyun alanının en alt sınırının hemen dışından başlar */
            width: 80px; height: 100px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; font-weight: bold; color: white;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: inset -10px -10px 0 rgba(0,0,0,0.1);
            z-index: 5;
            user-select: none;
        }

        .balloon::after {
            content: ''; position: absolute; bottom: -15px; left: 50%;
            width: 2px; height: 20px; background: rgba(0,0,0,0.2);
            transform: translateX(-50%);
        }

        .balloon.color1 { background-color: #ef4444; }
        .balloon.color2 { background-color: #3b82f6; }
        .balloon.color3 { background-color: #22c55e; }
        .balloon.color4 { background-color: #eab308; }
        .balloon.color5 { background-color: #a855f7; }

        /* Titreme artık düzgün çalışacak çünkü yukarı çıkma işlemi top ile yapılıyor */
        .balloon.shake { animation: shake 0.4s; }
        .balloon.popping { animation: popOut 0.3s forwards; pointer-events: none; }

        .celebration {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 100;
            flex-direction: column; justify-content: center; align-items: center;
            animation: fadeIn 0.5s;
        }
        
        .celebration h2 { font-size: 4rem; color: #f59e0b; font-family: 'Comfortaa', cursive; text-shadow: 2px 2px 0px #fff; margin-bottom: 10px; }
        .next-btn { background-color: var(--success); color: white; border: none; padding: 15px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; margin-top: 20px; transition: transform 0.2s; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }
        .next-btn:hover { transform: scale(1.1); }

        /* --- GÜNCELLENEN ANİMASYONLAR --- */
        @keyframes floatUp {
            0% { top: 100%; } /* Aşağıdan başla */
            100% { top: -20%; } /* Oyun alanının üstünden çık */
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-15px); }
            40%, 80% { transform: translateX(15px); }
        }

        @keyframes popOut {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <h1>EnglishQuest 🚀</h1>
        <p class="subtitle">Level 3: Balon Patlatma! (Spelling Hunt)</p>
    </header>

    <div id="gameArea">
        <div id="targetContainer">
            <i id="targetIcon" class="fa-solid"></i>
            <div id="wordSlotsContainer"></div>
        </div>
    </div>

    <div class="celebration" id="celebrationScreen">
        <h2>TEBRİKLER! 🎉</h2>
        <p id="celebrationText" style="font-size: 1.5rem; color: #475569;"></p>
        <button class="next-btn" onclick="nextWord()">Sıradaki Kelime <i class="fa-solid fa-arrow-right"></i></button>
    </div>

    <script>
        // wordsData'yı artık merkezi dosyadan çekiyoruz
const wordsData = getWords(); 


        let currentWordIndex = 0; 
        let currentWordData, currentTargetWord, currentLetterIndex, balloonsGenerated, spawnInterval;

        const gameArea = document.getElementById('gameArea');
        const wordSlotsContainer = document.getElementById('wordSlotsContainer');
        const targetIcon = document.getElementById('targetIcon');
        const celebrationScreen = document.getElementById('celebrationScreen');
        const celebrationText = document.getElementById('celebrationText');

        function initGame() {
            currentWordData = wordsData[currentWordIndex];
            currentTargetWord = currentWordData.word.toUpperCase();
            currentLetterIndex = 0;
            balloonsGenerated = 0;
            celebrationScreen.style.display = 'none'; 

            targetIcon.className = `fa-solid ${currentWordData.icon}`;

            wordSlotsContainer.innerHTML = '';
            for (let i = 0; i < currentTargetWord.length; i++) {
                const slot = document.createElement('div');
                slot.classList.add('letter-slot');
                slot.setAttribute('data-index', i);
                wordSlotsContainer.appendChild(slot);
            }

            startBalloonSpawning();
        }

        function startBalloonSpawning() {
            clearInterval(spawnInterval); 
            spawnInterval = setInterval(generateBalloon, 1500);
            for(let i=0; i<3; i++) generateBalloon();
        }

        function generateBalloon() {
            if (balloonsGenerated > 20) return;

            const balloon = document.createElement('div');
            balloon.classList.add('balloon');
            const colorClass = `color${Math.floor(Math.random() * 5) + 1}`;
            balloon.classList.add(colorClass);

            let char;
            if (Math.random() < 0.6) {
                char = currentTargetWord[currentLetterIndex];
            } else {
                const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                char = alphabet[Math.floor(Math.random() * alphabet.length)];
                if(char === currentTargetWord[currentLetterIndex]) char = 'X'; 
            }
            
            balloon.textContent = char;
            balloon.setAttribute('data-char', char);
            
            // Ekranın sağından veya solundan taşmasını engellemek için sınırları 10% - 80% arasına çektim
            balloon.style.left = `${Math.floor(Math.random() * 70) + 10}%`;

            const duration = Math.floor(Math.random() * 7) + 8;
            balloon.style.animation = `floatUp ${duration}s linear forwards`;
            balloon.style.animationDelay = `${Math.random() * 2}s`;

            balloon.addEventListener('click', handleBalloonClick);

            balloon.addEventListener('animationend', () => {
                balloon.remove();
                balloonsGenerated--;
            });

            gameArea.appendChild(balloon);
            balloonsGenerated++;
        }

        function handleBalloonClick() {
            // Eğer balon patlama aşamasındaysa veya oyun bittiyse tıklamayı yoksay
            if (this.classList.contains('popping') || currentLetterIndex >= currentTargetWord.length) return;

            const clickedChar = this.getAttribute('data-char');
            const targetChar = currentTargetWord[currentLetterIndex];

            if (clickedChar === targetChar) {
                this.classList.add('popping');
                playPopSound();
                
                this.addEventListener('animationend', () => {
                    this.remove();
                    balloonsGenerated--;
                });

                const currentSlot = wordSlotsContainer.children[currentLetterIndex];
                currentSlot.textContent = targetChar;
                currentSlot.classList.add('filled');

                currentLetterIndex++;

                if (currentLetterIndex === currentTargetWord.length) {
                    clearInterval(spawnInterval); 
                    
                    setTimeout(() => {
                        const remainingBalloons = document.querySelectorAll('.balloon');
                        remainingBalloons.forEach(b => b.remove());
                        
                        celebrationText.textContent = `"${currentTargetWord}" kelimesini başarıyla yazdın!`;
                        celebrationScreen.style.display = 'flex';
                        playVictorySound();
                    }, 800);
                }
            } else {
                this.classList.add('shake');
                playErrorSound();
                setTimeout(() => {
                    this.classList.remove('shake');
                }, 400);
            }
        }

        function nextWord() {
            currentWordIndex++;
            if (currentWordIndex >= wordsData.length) {
                currentWordIndex = 0; 
            }
            initGame();
        }

        function playPopSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain); gain.connect(context.destination);
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, context.currentTime); 
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);
            osc.start(); osc.stop(context.currentTime + 0.1);
        }

        function playErrorSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            osc.connect(gain); gain.connect(context.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(150, context.currentTime); 
            gain.gain.setValueAtTime(0.2, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
            osc.start(); osc.stop(context.currentTime + 0.3);
        }

        function playVictorySound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const notes = [523.25, 659.25, 783.99, 1046.50]; 
            let time = context.currentTime;
            notes.forEach((freq, index) => {
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.connect(gain); gain.connect(context.destination);
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.1, time);
                gain.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
                osc.start(time); osc.stop(time + 0.2);
                time += 0.15;
            });
        }

        initGame();

    </script>
</body>
</html>
