<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnglishQuest - Level 1: Kelime Kartları</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@500;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --primary-color: #bc84ee;
            --secondary-color: #ff823a;
            --success-color: #dcfd8b;
            --bg-color: #f0f9ff;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Fredoka', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Başlık Alanı */
        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Comfortaa', cursive;
            color: #0f172a;
            font-size: 2.5rem;
            margin: 10px 0;
            text-shadow: 2px 2px 0px #fff;
        }

        .subtitle {
            color: #64748b;
            font-size: 1.2rem;
            margin: 0;
        }

        /* Başarı Takip Barı (Yıldızlar) */
        .progress-container {
            background: #fff;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .star-icon {
            font-size: 1.8rem;
            color: #cbd5e1;
            transition: color 0.3s, transform 0.3s;
        }

        .star-icon.active {
            color: #f59e0b;
            transform: scale(1.2);
            animation: pop 0.3s ease-in-out;
        }

        /* Kart Izgarası */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 900px;
            padding: 10px;
        }

        /* 3D Kart Yapısı */
        .card {
            background-color: transparent;
            height: 280px;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        /* Kart tıklandığında dönecek sınıf */
        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 6px solid #fff;
        }

        /* Kart Ön Yüzü (Görsel Alan) */
        .card-front {
            background-color: #fff;
            color: var(--text-color);
        }

        .card-front i {
            font-size: 5rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            transition: transform 0.3s;
        }

        .card:hover .card-front i {
            transform: scale(1.1) rotate(5deg);
        }

        .card-front span {
            font-size: 1.5rem;
            font-weight: 600;
            color: #64748b;
        }

        /* Kart Arka Yüzü (İngilizce & Ses) */
        .card-back {
            background-color: var(--primary-color);
            color: white;
            transform: rotateY(180deg);
        }

        .english-word {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .audio-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
            margin-bottom: 15px;
        }

        .audio-btn:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .learned-btn {
            background-color: var(--success-color);
            color: #1e293b;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .learned-btn:hover {
            transform: scale(1.05);
        }

        /* Tamamlanan Kart Süsü */
        .card.completed .card-inner {
            border: 6px solid #10b981;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.2);
        }

        /* Animasyonlar */
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.4); }
            100% { transform: scale(1.2); }
        }
    </style>
</head>
<body>

    <header>
        <h1>EnglishQuest 🚀</h1>
        <p class="subtitle">Level 1: İlk Kelimelerim (First Words)</p>
    </header>

    <div class="progress-container">
        <span style="font-size: 1.2rem; font-weight: bold;">Öğrenilen Kelimeler:</span>
        <i class="fa-solid fa-star star-icon" id="star1"></i>
        <i class="fa-solid fa-star star-icon" id="star2"></i>
        <i class="fa-solid fa-star star-icon" id="star3"></i>
        <i class="fa-solid fa-star star-icon" id="star4"></i>
        <i class="fa-solid fa-star star-icon" id="star5"></i>
        <i class="fa-solid fa-star star-icon" id="star6"></i>
    </div>

    <div class="grid" id="cardGrid"></div>

    <script>

        let learnedCount = 0;
        const cardGrid = document.getElementById('cardGrid');

        // Kartları Dinamik Olarak Oluşturma
        wordsData.forEach(item => {
            const cardElement = document.createElement('div');
            cardElement.classList.add('card');
            cardElement.innerHTML = `
                <div class="card-inner">
                    <div class="card-front">
                        <i class="fa-solid ${item.icon}" style="color: ${item.color}"></i>
                        <span>${item.turkish}</span>
                    </div>
                    <div class="card-back" style="background-color: ${item.color}">
                        <div class="english-word">${item.english}</div>
                        <button class="audio-btn" onclick="playAudio('${item.english}', event)">
                            <i class="fa-solid fa-volume-high"></i> Dinle
                        </button>
                        <button class="learned-btn" onclick="markAsLearned(${item.id}, event)">
                            Öğrendim!
                        </button>
                    </div>
                </div>
            `;

            // Karta tıklayınca dönme efekti
            cardElement.addEventListener('click', function(e) {
                // Eğer butonlara tıklanmadıysa kartı döndür
                if(!e.target.closest('button')) {
                    this.classList.toggle('flipped');
                    // Eğer kart İngilizce yüzüne döndüyse otomatik seslendir
                    if(this.classList.contains('flipped')) {
                        playAudio(item.english);
                    }
                }
            });

            cardGrid.appendChild(cardElement);
        });

        // SESLENDİRME MEKANİZMASI (Web Speech API)
        function playAudio(text, event) {
            if(event) event.stopPropagation(); // Kartın tekrar dönmesini engeller
            
            // Tarayıcının konuşma motorunu tetikliyoruz
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; // İngilizce telaffuz
            utterance.rate = 0.8;     // Çocuklar için biraz daha yavaş ve anlaşılır hız (Varsayılan 1.0)
            
            window.speechSynthesis.speak(utterance);
        }

        // ÖĞRENDİM BUTONU VE YILDIZ GÜNCELLEME
        function markAsLearned(id, event) {
            event.stopPropagation();
            const cards = document.querySelectorAll('.card');
            const clickedCard = cards[id - 1];

            if (!clickedCard.classList.contains('completed')) {
                clickedCard.classList.add('completed');
                learnedCount++;
                
                // Yıldızları aktifleştir
                const star = document.getElementById(`star${learnedCount}`);
                if (star) {
                    star.classList.add('active');
                }

                // Tebrik Sesi (Web Audio API ile basit bir bip-bip sesi üretiyoruz)
                playSuccessSound();

                // Geri döndür
                setTimeout(() => {
                    clickedCard.classList.remove('flipped');
                }, 1000);
            }
        }

        // Basit ve tatlı bir başarı sesi üretici (Harici dosya gerektirmez!)
        function playSuccessSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();
            
            osc.connect(gain);
            gain.connect(context.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, context.currentTime); // C5 notası
            osc.frequency.setValueAtTime(659.25, context.currentTime + 0.1); // E5 notası
            
            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.3);
            
            osc.start();
            osc.stop(context.currentTime + 0.3);
        }
    </script>
</body>
</html>
